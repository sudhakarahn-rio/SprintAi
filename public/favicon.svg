<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="QuizMaker">
  <defs>
    <linearGradient id="qRed" x1="4" y1="2" x2="30" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fca5a5"/>
      <stop offset="0.35" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="tileShine" x1="0" y1="0" x2="0" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4f4f5"/>
    </linearGradient>
    <filter id="letterShadow" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0.5" stdDeviation="0.6" flood-color="#7f1d1d" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#tileShine)"/>
  <rect width="32" height="32" rx="8" fill="none" stroke="#e4e4e7" stroke-opacity="0.9" stroke-width="0.5"/>
  <text
    x="16"
    y="22.5"
    text-anchor="middle"
    font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="18"
    font-weight="800"
    letter-spacing="-0.03em"
    fill="url(#qRed)"
    filter="url(#letterShadow)"
  >Q</text>
</svg>
